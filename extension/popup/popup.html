<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>PlanWise</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div id="app">

      <div class="header">
        <span class="logo">PlanWise</span>
        <span class="subtitle" id="header-subtitle">Plan detected</span>
      </div>

      <!-- Auth screen — shown when not logged in -->
      <div id="auth-screen" class="hidden">
        <div class="auth-form">
          <p class="auth-subtitle">Sign in to save your plans</p>
          <input type="email" id="auth-email" placeholder="Email" autocomplete="email" />
          <input type="password" id="auth-password" placeholder="Password" autocomplete="current-password" />
          <div class="auth-actions">
            <button id="btn-signin" class="btn btn-yes">Sign in</button>
            <button id="btn-signup" class="btn btn-no">Sign up</button>
          </div>
          <p class="auth-error hidden" id="auth-error"></p>
        </div>
      </div>

      <div id="loading" class="state">
        <p>Loading...</p>
      </div>

      <div id="empty" class="state hidden">
        <p class="empty-text">No pending plans.</p>
        <p class="empty-sub">PlanWise is watching your conversations.</p>
      </div>

      <div id="event-card" class="hidden">
        <div class="source-text" id="source-text"></div>
        <div class="fields">
          <div class="field">
            <label>Title</label>
            <input type="text" id="field-title" />
          </div>
          <div class="field">
            <label>Date</label>
            <input type="date" id="field-date" />
          </div>
          <div class="field">
            <label>Time</label>
            <input type="time" id="field-time" />
          </div>
          <div class="field">
            <label>People</label>
            <input type="text" id="field-participants" placeholder="Names, comma separated" />
          </div>
          <div class="field">
            <label>Notes</label>
            <input type="text" id="field-notes" placeholder="Optional notes" />
          </div>
        </div>

        <div class="actions">
          <button id="btn-yes" class="btn btn-yes">Add</button>
          <button id="btn-no"  class="btn btn-no" >Dismiss</button>
        </div>
        <div class="queue-info" id="queue-info"></div>
      </div>

      <div class="dashboard-link">
        <a id="btn-dashboard" href="#">View Calendar →</a>
      </div>
    </div>

    <!-- Load order matters: vendor → storage → supabase client → popup logic -->
    <script src="../vendor/supabase.js"></script>
    <script src="../utils/storage.js"></script>
    <script src="../utils/supabase-client.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
