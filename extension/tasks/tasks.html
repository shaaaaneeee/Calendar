<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>PlanWise — Tasks</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=block" />
  <link rel="stylesheet" href="tasks.css" />
</head>
<body>
  <div id="app">

    <!-- Top bar -->
    <header id="topbar">
      <div class="topbar-brand">
        <span class="brand-name">PlanWise</span>
        <span class="brand-badge">BETA</span>
      </div>
      <div class="topbar-center">
        <h1 class="page-title">Tasks</h1>
      </div>
      <div class="topbar-right">
        <button id="btn-add-task" class="add-task-btn">
          <span class="material-symbols-outlined">add</span>
          NEW TASK
        </button>
      </div>
    </header>

    <!-- Body -->
    <div id="body">

      <!-- Left nav (same structure as dashboard) -->
      <nav id="leftnav">
        <a href="../dashboard/dashboard.html" class="leftnav-item">
          <span class="material-symbols-outlined">calendar_today</span>
          <span>Calendar</span>
        </a>
        <a href="tasks.html" class="leftnav-item active">
          <span class="material-symbols-outlined">task_alt</span>
          <span>Tasks</span>
        </a>
        <a href="../settings/settings.html" class="leftnav-item">
          <span class="material-symbols-outlined">settings</span>
          <span>Settings</span>
        </a>
        <a href="../training/training.html" class="leftnav-item">
          <span class="material-symbols-outlined">model_training</span>
          <span>Training</span>
        </a>
      </nav>

      <!-- Kanban board -->
      <main id="main">
        <div id="board">

          <div class="column" id="col-todo">
            <div class="col-head">
              <span class="col-title">TODO</span>
              <span class="col-count" id="count-todo">0</span>
              <button class="col-add-btn" data-col="todo">
                <span class="material-symbols-outlined">add</span>
              </button>
            </div>
            <div class="cards" id="cards-todo"></div>
          </div>

          <div class="column" id="col-inprogress">
            <div class="col-head">
              <span class="col-title">IN PROGRESS</span>
              <span class="col-count" id="count-inprogress">0</span>
              <button class="col-add-btn" data-col="inprogress">
                <span class="material-symbols-outlined">add</span>
              </button>
            </div>
            <div class="cards" id="cards-inprogress"></div>
          </div>

          <div class="column" id="col-done">
            <div class="col-head">
              <span class="col-title">DONE</span>
              <span class="col-count" id="count-done">0</span>
              <button class="col-add-btn" data-col="done">
                <span class="material-symbols-outlined">add</span>
              </button>
            </div>
            <div class="cards" id="cards-done"></div>
          </div>

        </div>
      </main>

    </div><!-- /#body -->
  </div><!-- /#app -->

  <!-- Add / Edit task modal -->
  <div id="modal-overlay" class="hidden">
    <div id="modal">
      <div class="modal-head">
        <div class="modal-label" id="modal-title">ADD TASK</div>
        <button id="modal-close" class="close-btn">
          <span class="material-symbols-outlined">close</span>
        </button>
      </div>

      <div class="modal-fields">
        <div class="modal-row">
          <label class="row-label">TITLE</label>
          <input type="text" id="task-title" class="row-input" placeholder="What needs doing?" />
        </div>
        <div class="modal-row">
          <label class="row-label">DUE DATE</label>
          <input type="date" id="task-date" class="row-input" />
        </div>
        <div class="modal-row">
          <label class="row-label">PRIORITY</label>
          <select id="task-priority" class="row-input">
            <option value="">None</option>
            <option value="high">High</option>
            <option value="medium">Medium</option>
            <option value="low">Low</option>
          </select>
        </div>
        <div class="modal-row modal-row-notes">
          <label class="row-label">NOTES</label>
          <textarea id="task-notes" class="row-input row-textarea" rows="2" placeholder="Optional notes..."></textarea>
        </div>
      </div>

      <div class="modal-foot">
        <button id="modal-save"   class="btn btn-primary">Save</button>
        <button id="modal-delete" class="btn btn-danger hidden">Delete</button>
        <button id="modal-cancel" class="btn btn-ghost">Cancel</button>
      </div>
    </div>
  </div>

  <script src="tasks.js"></script>
</body>
</html>
